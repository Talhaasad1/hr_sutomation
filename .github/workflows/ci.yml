name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest mongomock flake8

      - name: Syntax / import check
        run: python -m py_compile *.py

      - name: Lint (flake8 — errors only, style warnings don't fail the build)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run test suite (against in-memory MongoDB via mongomock)
        run: pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image (build only — not pushed)
        run: docker build -t ats-portal:ci .
